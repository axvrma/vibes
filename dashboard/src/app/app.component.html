<ng-container *ngIf="auth.user$ | async as user; else unauthenticated">
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav #drawer class="sidenav" fixedInViewport
        [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
        [mode]="(isHandset$ | async) ? 'over' : 'side'"
        [opened]="(isHandset$ | async) === false">
      <mat-toolbar class="brand-toolbar">
        <mat-icon>movie</mat-icon>
        <div class="brand-text">
          <span class="title">Reels Library</span>
          <span class="subtitle">Private Media Server</span>
        </div>
      </mat-toolbar>
      <mat-nav-list>
        <a mat-list-item routerLink="/dashboard" routerLinkActive="active-nav-item" [routerLinkActiveOptions]="{exact: true}">
          <mat-icon matListItemIcon>dashboard</mat-icon>
          <div matListItemTitle>Videos</div>
        </a>
        <a mat-list-item routerLink="/dashboard/categories" routerLinkActive="active-nav-item">
          <mat-icon matListItemIcon>folder</mat-icon>
          <div matListItemTitle>Categories</div>
        </a>
        <a mat-list-item routerLink="/dashboard/tags" routerLinkActive="active-nav-item">
          <mat-icon matListItemIcon>label</mat-icon>
          <div matListItemTitle>Tags</div>
        </a>
        <a mat-list-item routerLink="/dashboard/users" routerLinkActive="active-nav-item" *ngIf="user.role === 'admin'">
          <mat-icon matListItemIcon>people</mat-icon>
          <div matListItemTitle>Users</div>
        </a>
        <mat-divider></mat-divider>
        <div class="user-info-bottom">
          <div class="user-details">
            <span class="email">{{ user.email }}</span>
            <span class="role-chip">{{ user.role }}</span>
          </div>
          <button mat-stroked-button color="warn" (click)="logout()" class="logout-btn">
            <mat-icon>logout</mat-icon> Logout
          </button>
        </div>
      </mat-nav-list>
    </mat-sidenav>
    <mat-sidenav-content>
      <mat-toolbar class="top-app-bar">
        <button
          type="button"
          aria-label="Toggle sidenav"
          mat-icon-button
          (click)="drawer.toggle()"
          *ngIf="isHandset$ | async">
          <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
        </button>
        <span class="spacer"></span>
        <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-btn">
          <mat-icon>account_circle</mat-icon>
          <span class="hidden-on-mobile">{{ user.email }}</span>
        </button>
        <mat-menu #userMenu="matMenu">
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
          <button mat-menu-item (click)="logoutAll()">
            <mat-icon>devices_other</mat-icon>
            <span>Logout All Devices</span>
          </button>
        </mat-menu>
      </mat-toolbar>
      <main class="main-content">
        <router-outlet></router-outlet>
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
</ng-container>

<ng-template #unauthenticated>
  <main class="unauthenticated-content">
    <router-outlet></router-outlet>
  </main>
</ng-template>
