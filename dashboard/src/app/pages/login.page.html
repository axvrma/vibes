<div class="login-page-wrapper">
  <div class="login-container">
    <mat-card class="login-card">
      <div class="brand-header">
        <mat-icon class="brand-icon">movie</mat-icon>
        <h1>Reels Dashboard</h1>
      </div>
      
      <mat-card-content>
        <p class="login-subtitle text-muted">Sign in to manage your private media</p>
        
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email Address</mat-label>
            <input matInput type="email" formControlName="email" required placeholder="admin@example.com">
            <mat-icon matPrefix>email</mat-icon>
            <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
            <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Please enter a valid email address</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" required>
            <mat-icon matPrefix>lock</mat-icon>
            <button type="button" mat-icon-button matSuffix (click)="hidePassword = !hidePassword" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hidePassword">
              <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
          </mat-form-field>

          <button mat-flat-button color="primary" type="submit" [disabled]="loginForm.invalid || isLoading" class="submit-button">
            <mat-icon *ngIf="!isLoading">login</mat-icon>
            <span *ngIf="isLoading" class="spinner-container">
              <mat-icon class="spinning">sync</mat-icon>
            </span>
            {{ isLoading ? 'Signing in...' : 'Sign In' }}
          </button>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
